# Optional: deploy the FastAPI backend on Render when Streamlit Cloud auth blocks API access.
# After deploy, set VITE_API_URL on Vercel to your Render service URL (or update vercel.json proxy).
services:
  - type: web
    name: restaurant-recommendation-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.phase2.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        value: sqlite:///./data/processed/restaurants.db
      - key: LLM_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: https://restaurant-recommendation-app-seven.vercel.app,http://localhost:5173
