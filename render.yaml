# Optional: deploy the FastAPI backend on Render (recommended for production).
# Dashboard → restaurant-recommendation-api → Settings:
#   Start command: uvicorn render_app:app --host 0.0.0.0 --port $PORT
#   Build command: pip install -r requirements.txt
# Environment → add GROQ_API_KEY (secret).
services:
  - type: web
    name: restaurant-recommendation-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn render_app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        value: sqlite:///./data/processed/restaurants.db
      - key: LLM_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: https://restaurant-recommendation-app-seven.vercel.app,http://localhost:5173
