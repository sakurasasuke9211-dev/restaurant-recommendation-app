# Optional: deploy the FastAPI backend on Render (recommended for production).
# 1. Go to https://dashboard.render.com → New → Blueprint → connect this repo.
# 2. Add GROQ_API_KEY in the Render service environment.
# 3. Vercel proxies /api/* to this service (see frontend/vercel.json).
services:
  - type: web
    name: restaurant-recommendation-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.phase2.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        value: sqlite:///./data/processed/restaurants.db
      - key: LLM_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: https://restaurant-recommendation-app-seven.vercel.app,http://localhost:5173
